<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class and ids</title>
    <style>
        /* for the class we use . */
        .red{
            background-color: crimson;
        }
        .black{
            color: aqua;
            background-color: black;
        }
        /* for id we use # */
        #green{
            background-color: yellow;
        }
        .tb{
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <p class="red">Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex, est.</p>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Obcaecati, temporibus?</p>

    <h1 class="red">
        test1
    </h1>
    <h3 id="green">
        test2
    </h3>
    <table class="tb">
        <th>
            <tr>
                test
            </tr>
            <tr>
                test
            </tr>
            <tr>
                test
            </tr>
        </th>
    </table>
</body>
</html>
