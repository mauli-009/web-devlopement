<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Events</title>
    <style>
        body {
            background-color: #414141;
            color: aliceblue;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 10px;
        }
        img {
            width: 200px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Amazing Images</h2>
    <div>
        <ul id="images">
            <li><img id="photoshop" src="https://images.pexels.com/photos/3561339/pexels-photo-3561339.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="Photoshop"></li>
            <li><img id="japan" src="https://images.pexels.com/photos/3532553/pexels-photo-3532553.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="Japan landscape"></li>
            <li><img id="river" src="https://images.pexels.com/photos/3532551/pexels-photo-3532551.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="River view"></li>
            <li><img id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="Owl"></li>
            <li><img id="prayer" src="https://images.pexels.com/photos/2522671/pexels-photo-2522671.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="Prayer moment"></li>
            <li><a href="https://google.com" id="google">Google</a></li>
        </ul>
    </div>
</body>
<script>
    // // Adding click event listener to the owl image
    // document.getElementById('owl').addEventListener('click', function (e) {
    //     alert("Owl selected");
    //     document.body.style.backgroundColor = "red";
    // });

    // // Adding double-click event listener to the owl image
    // document.getElementById('owl').addEventListener('dblclick', function (e) {
    //     document.body.style.backgroundColor = "white";
    // });

    // // Adding click event listener to the images ul
    // document.getElementById('images').addEventListener('click', function (e) {
    //     alert("Clicked inside the images ul");
    // });

    document.querySelector('#images').addEventListener('click',function(e){
        let removeIt=e.target.parentNode
        removeIt.remove();

    })
</script>
</html>
